---
- name: Agregar cuentas de dominio al grupo Administrators local
  hosts: "{{ target_hosts }}"
  gather_facts: false

  vars:
    domain: "SANTILLANA"
    modo: "individual"  # individual = un host | todos = grupo completo

  tasks:

    - name: Validar que se proporcionaron cuentas
      ansible.builtin.fail:
        msg: "Debes proporcionar la variable 'admin_accounts' con al menos un usuario"
      when: admin_accounts is not defined or admin_accounts | length == 0

    - name: Validar modo
      ansible.builtin.fail:
        msg: "La variable 'modo' debe ser 'individual' o 'todos'"
      when: modo not in ['individual', 'todos']

    - name: Mostrar modo de ejecución
      ansible.builtin.debug:
        msg: "Modo: {{ modo }} | Host(s): {{ target_hosts }} | Cuentas: {{ admin_accounts }}"

    - name: Agregar cuentas al grupo Administrators
      ansible.windows.win_group_membership:
        name: Administrators
        members: "{{ admin_accounts | map('regex_replace', '^(?!.*\\\\)', domain + '\\\\') | list }}"
        state: present