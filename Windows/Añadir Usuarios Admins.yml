---
- name: Gestión de administradores locales en Windows
  hosts: all
  gather_facts: false

  vars:
    domain: "SANCLOCAL"

  tasks:

    - name: Validar variables
      ansible.builtin.fail:
        msg: "Debes proporcionar 'action' y 'admin_accounts' antes de ejecutar"
      when: >
        action is not defined or action | length == 0 or
        admin_accounts is not defined or admin_accounts | length == 0

    - name: "{{ action }} cuentas en el grupo Administrators"
      ansible.windows.win_group_membership:
        name: Administrators
        members: "{{ admin_accounts.split(',') | map('trim') | map('regex_replace', '^(?!.*\\\\)', domain + '\\\\') | list }}"
        state: "{{ 'present' if action == 'Agregar' else 'absent' }}"

    - name: Mostrar resultado
      ansible.builtin.debug:
        msg: "{{ action }} en {{ inventory_hostname }}: {{ admin_accounts.split(',') | map('trim') | list }}"