---
- name: Instalar Zabbix Agent 2 en Windows
  hosts: windows
  gather_facts: false
  serial: 10

  vars:
    zabbix_server_ip: "10.138.120.3"
    msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.4/7.4.9/zabbix_agent2-7.4.9-windows-amd64-openssl.msi"
    msi_dest: 'C:\Temp\zabbix_agent2.msi'

  tasks:

    - name: Crear carpeta Temp
      win_file:
        path: C:\Temp
        state: directory

    - name: Verificar si Agent 2 ya esta instalado
      win_service:
        name: "Zabbix Agent 2"
      register: agent_service
      ignore_errors: yes

    - name: Desinstalar agente legacy si existe
      win_shell: |
        $app = Get-WmiObject -Class Win32_Product |
               Where-Object {$_.Name -like '*Zabbix Agent*' -and $_.Name -notlike '*2*'}
        if ($app) { $app.Uninstall() }
      ignore_errors: yes
      when: not agent_service.exists | default(false)

    - name: Descargar MSI Zabbix Agent 2
      win_get_url:
        url: "{{ msi_url }}"
        dest: "{{ msi_dest }}"
      when: not agent_service.exists | default(false)

    - name: Instalar Zabbix Agent 2 con HostMetadata
      win_shell: |
        msiexec /i "{{ msi_dest }}" /qn `
          SERVER={{ zabbix_server_ip }} `
          SERVERACTIVE={{ zabbix_server_ip }} `
          HOSTNAME={{ inventory_hostname }} `
          HOSTMETADATA=windows
        Start-Sleep -Seconds 15
      when: not agent_service.exists | default(false)

    - name: Verificar y agregar HostMetadata si no existe
      win_shell: |
        $conf = 'C:\Program Files\Zabbix Agent 2\zabbix_agent2.conf'
        $content = Get-Content $conf
        if (-not ($content -match "^HostMetadata=")) {
            Add-Content -Path $conf -Value 'HostMetadata=windows'
            Write-Output "Agregado"
        } else {
            Write-Output "Ya existe"
        }
      register: metadata_result

    - name: Abrir puerto 10050 en firewall
      win_shell: |
        netsh advfirewall firewall add rule `
          name="Zabbix Agent 2" `
          protocol=TCP `
          dir=in `
          localport=10050 `
          action=allow
      ignore_errors: yes

    - name: Iniciar y habilitar servicio
      win_service:
        name: "Zabbix Agent 2"
        state: restarted
        start_mode: auto

    - name: Verificar estado final
      win_service:
        name: "Zabbix Agent 2"
      register: final_status

    - name: Resultado
      debug:
        msg: "{{ inventory_hostname }} | Agent: {{ final_status.state }} | Metadata: {{ metadata_result.stdout | trim }}"