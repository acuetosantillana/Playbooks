---
- name: Crear VM Rocky Linux 9.6 en Hyper-V Failover Cluster
  hosts: "{{ hyperv_host }}"
  gather_facts: no

  collections:
    - ansible.windows

  vars:
    # Nodos del Cluster Hyper-V
    cluster_nodes:
      - SMXHYPVA
      - SMXHYPVB

    # vSwitch por defecto
    default_switch: 'LAN-Prod'

    # Volúmenes CSV disponibles (Cluster Shared Volumes)
    csv_volumes:
      - 'C:\\ClusterStorage\\Volume1'
      - 'C:\\ClusterStorage\\Volume2'
      - 'C:\\ClusterStorage\\Volume3'
      - 'C:\\ClusterStorage\\Volume4'
      - 'C:\\ClusterStorage\\Volume5'
      - 'C:\\ClusterStorage\\Volume6'
      - 'C:\\ClusterStorage\\Volume7'

    # ISO Rocky por defecto en NAS
    iso_path_default: '\\10.138.120.130\isos\Rocky-9.6-x86_64-dvd.iso'

    # NAS para el SMB Global Mapping
    nas_server: '10.138.120.130'
    nas_share: 'isos'
    nas_user: 'NASUSER_AQUI'
    nas_pass: 'NASPASS_AQUI'

    # Ruta local de oscdimg.exe en el host Hyper-V
    oscdimg_path: 'C:\\Oscdimg\\oscdimg.exe'

    # Parámetros de la instalación de Rocky
    root_password: "Passw0rd."
    linux_user: "adm"
    linux_password: "Passw0rd."
    timezone: "America/Mexico_City"
    lang: "es_MX.UTF-8"

  tasks:
    # -------------------------------------------------------------------
    # 0) Validaciones y normalización
    # -------------------------------------------------------------------
    - name: Validar que el host pertenece al cluster
      ansible.builtin.assert:
        that:
          - inventory_hostname in cluster_nodes
        fail_msg: "El host {{ inventory_hostname }} no está en la lista de nodos del cluster."

    - name: Validar variables obligatorias
      ansible.builtin.assert:
        that:
          - vm_name is defined
          - memory_gb is defined
          - cpu is defined
          - disk_gb is defined
          - vm_ip is defined
          - vm_mask is defined
          - vm_gateway is defined
          - vm_dns1 is defined
        fail_msg: >-
          Faltan variables: vm_name, memory_gb, cpu, disk_gb,
          vm_ip, vm_mask, vm_gateway, vm_dns1.

    - name: Normalizar variables numéricas y rutas
      ansible.builtin.set_fact:
        v_switch_eff: "{{ v_switch | default(default_switch) }}"
        iso_path_eff: "{{ iso_path | default(iso_path_default) }}"
        memory_bytes: "{{ (memory_gb | int) * 1073741824 }}"
        disk_bytes: "{{ (disk_gb | int) * 1073741824 }}"
        cpu_count: "{{ cpu | int }}"
        vm_dns2_eff: "{{ vm_dns2 | default(vm_dns1) }}"
        ks_dir: "C:\\kickstart\\{{ vm_name }}"
        ks_cfg_path: "C:\\kickstart\\{{ vm_name }}\\ks.cfg"
        ks_iso_path: "C:\\ISOs\\{{ vm_name }}_ks.iso"

    # -------------------------------------------------------------------
    # 1) SMB Global Mapping hacia la NAS
    # -------------------------------------------------------------------
    - name: Verificar si SMB Global Mapping ya existe
      ansible.windows.win_shell: |
        $remotePath = "\\{{ nas_server }}\{{ nas_share }}"
        $mapping = Get-SmbGlobalMapping -RemotePath $remotePath -ErrorAction SilentlyContinue
        if ($mapping) {
          Write-Output "EXISTS"
        } else {
          Write-Output "NOTFOUND"
        }
      register: smb_check
      changed_when: false

    - name: Crear SMB Global Mapping hacia la NAS para Hyper-V
      ansible.windows.win_shell: |
        $remotePath = "\\{{ nas_server }}\{{ nas_share }}"
        $secPass = ConvertTo-SecureString "{{ nas_pass }}" -AsPlainText -Force
        $cred = New-Object System.Management.Automation.PSCredential("{{ nas_user }}", $secPass)
        
        try { 
          net use $remotePath /delete /y 2>$null 
        } catch { }
        
        New-SmbGlobalMapping -RemotePath $remotePath -Credential $cred -Persistent $true -ErrorAction Stop
        Write-Output "Mapping creado exitosamente"
      when: smb_check.stdout.strip() == "NOTFOUND"
      register: smb_result

    # -------------------------------------------------------------------
    # 2) Preparar carpetas (ISOs y Kickstart)
    # -------------------------------------------------------------------
    - name: Crear carpeta local para ISOs
      ansible.windows.win_file:
        path: "C:\\ISOs"
        state: directory

    - name: Crear carpeta Kickstart para esta VM
      ansible.windows.win_file:
        path: "{{ ks_dir }}"
        state: directory

    - name: Generar ks.cfg (Kickstart) para Rocky Linux 9.6
      ansible.windows.win_template:
        src: "templates/ks.cfg.j2"
        dest: "{{ ks_cfg_path }}"
    
    - name: Convertir ks.cfg a formato Unix (LF) con UTF-8
      ansible.windows.win_powershell:
        script: |
          param([string]$FilePath)
          
          $content = Get-Content -Path $FilePath -Raw -Encoding UTF8
          $content = $content.Replace("`r`n", "`n")
          $content = $content.TrimEnd()
          $content = $content + "`n"
          
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText($FilePath, $content, $utf8NoBom)
          
          Write-Host "✓ Archivo corregido: UTF-8 sin BOM, terminaciones LF"
        parameters:
          FilePath: "{{ ks_cfg_path }}"

    # -------------------------------------------------------------------
    # 3) Crear ISO OEMDRV con ks.cfg usando oscdimg
    # -------------------------------------------------------------------
    - name: Verificar existencia de oscdimg.exe
      ansible.windows.win_stat:
        path: "{{ oscdimg_path }}"
      register: oscdimg_stat

    - name: Fallar si oscdimg no existe
      ansible.builtin.fail:
        msg: "oscdimg.exe no encontrado en {{ oscdimg_path }}"
      when: not oscdimg_stat.stat.exists

    - name: Eliminar ISO Kickstart anterior si existe
      ansible.windows.win_file:
        path: "{{ ks_iso_path }}"
        state: absent

    - name: Crear ISO Kickstart (OEMDRV) con oscdimg
      ansible.windows.win_command: >
        "{{ oscdimg_path }}"
        -lOEMDRV
        -n
        -m
        "{{ ks_dir }}"
        "{{ ks_iso_path }}"
      args:
        creates: "{{ ks_iso_path }}"
      register: oscdimg_result

    # -------------------------------------------------------------------
    # 4) Crear VM en Cluster con CSV
    # -------------------------------------------------------------------
    - name: Crear VM Rocky Linux 9.6 como Highly Available en Cluster
      ansible.windows.win_powershell:
        script: |
          param(
            [string]$VmName,
            [Int64]$MemoryBytes,
            [Int64]$DiskBytes,
            [int]$CpuCount,
            [string]$SwitchName,
            [string]$IsoPath,
            [string]$KsIsoPath,
            [string[]]$CsvVolumes,
            [int]$VlanId = 0
          )

          Import-Module Hyper-V
          Import-Module FailoverClusters

          Write-Host "=========================================="
          Write-Host "Creando VM en Cluster Hyper-V"
          Write-Host "=========================================="

          # 1. Verificar que el cluster está disponible
          try {
            $cluster = Get-Cluster -ErrorAction Stop
            Write-Host "Cluster detectado: $($cluster.Name)"
          } catch {
            throw "No se puede conectar al cluster de failover."
          }

          # ----------------------------------------------------------------
          # 2. Seleccionar CSV con MÁS espacio libre usando WMI
          #    (los CSV no tienen letra de unidad, Get-Volume -DriveLetter no sirve)
          # ----------------------------------------------------------------
          Write-Host "`nSeleccionando volumen CSV con más espacio disponible..."

          # Obtener info de todos los CSV del cluster vía WMI
          $csvInfo = Get-WmiObject -Namespace root\MSCluster -Class MSCluster_Resource `
                      -Filter "Type='Physical Disk'" -ErrorAction SilentlyContinue

          # Mapeo: nombre de carpeta CSV -> espacio libre real
          $csvFreeMap = @{}

          foreach ($csvPath in $CsvVolumes) {
            if (-not (Test-Path $csvPath)) {
              Write-Host "  $csvPath - No accesible, omitiendo"
              continue
            }

            try {
              # Usar Get-PSDrive o DirectoryInfo para obtener espacio
              # El método más confiable para CSV: Win32_Volume por DeviceID
              $volName = (Get-Item $csvPath).Name  # "Volume1", "Volume2", etc.

              # Buscar en Win32_Volume filtrando por label o path
              $winVol = Get-WmiObject Win32_Volume | Where-Object {
                $_.Name -like "*ClusterStorage*" -and $_.Caption -like "*$csvPath*"
              } | Select-Object -First 1

              if (-not $winVol) {
                # Fallback: usar System.IO.DriveInfo sobre la raíz C:\ClusterStorage
                # Los CSV son reparse points bajo C:\ClusterStorage\
                # El espacio real se obtiene via .NET sobre la ruta completa
                $driveInfo = [System.IO.DriveInfo]::new("C:")
                # No sirve para CSV individual, usamos alternativa con fsutil/robocopy trick
                # Mejor opción: Get-ClusterSharedVolume
                $csvObj = Get-ClusterSharedVolume | Where-Object {
                  $_.SharedVolumeInfo.FriendlyVolumeName -like "*$volName*" -or
                  $_.Name -like "*$volName*"
                } | Select-Object -First 1

                if ($csvObj) {
                  $freeBytes = $csvObj.SharedVolumeInfo.Partition.FreeSpace
                  $csvFreeMap[$csvPath] = $freeBytes
                  Write-Host ("  {0} - Libre: {1:N2} GB  [via ClusterSharedVolume]" -f $csvPath, ($freeBytes/1GB))
                } else {
                  Write-Host "  $csvPath - No se pudo obtener espacio, asignando 0"
                  $csvFreeMap[$csvPath] = 0
                }
              } else {
                $freeBytes = $winVol.FreeSpace
                $csvFreeMap[$csvPath] = $freeBytes
                Write-Host ("  {0} - Libre: {1:N2} GB  [via Win32_Volume]" -f $csvPath, ($freeBytes/1GB))
              }
            } catch {
              Write-Host "  $csvPath - Error al obtener espacio: $($_.Exception.Message)"
              $csvFreeMap[$csvPath] = 0
            }
          }

          # Elegir el CSV con mayor espacio libre
          $bestVolume = $csvFreeMap.GetEnumerator() |
                          Sort-Object Value -Descending |
                          Select-Object -First 1

          if (-not $bestVolume -or $bestVolume.Value -eq 0) {
            # Último fallback: tomar el primero accesible
            $bestVolume = [PSCustomObject]@{
              Key   = ($CsvVolumes | Where-Object { Test-Path $_ } | Select-Object -First 1)
              Value = 0
            }
            Write-Host "⚠ No se obtuvo espacio de ningún CSV, usando primer volumen disponible"
          }

          $selectedCsv  = $bestVolume.Key
          $selectedFree = $bestVolume.Value

          Write-Host "`n✓ Volumen seleccionado: $selectedCsv"
          if ($selectedFree -gt 0) {
            Write-Host ("  Espacio libre: {0:N2} GB" -f ($selectedFree/1GB))
          }

          # Validar que hay espacio suficiente
          if ($selectedFree -gt 0 -and $selectedFree -lt $DiskBytes) {
            throw ("Espacio insuficiente en {0}. Libre: {1:N2} GB, Requerido: {2:N2} GB" -f `
              $selectedCsv, ($selectedFree/1GB), ($DiskBytes/1GB))
          }

          # ----------------------------------------------------------------
          # 3. Crear estructura de directorios en CSV
          # ----------------------------------------------------------------
          $vmRoot = Join-Path $selectedCsv $VmName
          $vhdPath = Join-Path $vmRoot "Virtual Hard Disks\$VmName.vhdx"
          $vhdDir  = Split-Path $vhdPath -Parent

          foreach ($dir in @($vmRoot, $vhdDir)) {
            if (-not (Test-Path $dir)) {
              New-Item -ItemType Directory -Path $dir -Force | Out-Null
            }
          }
          Write-Host "✓ Estructura de directorios creada en CSV"

          # 4. Validar ISOs
          if (-not (Test-Path $IsoPath)) {
            throw "No se puede acceder a la ISO de Rocky: $IsoPath"
          }
          if (-not (Test-Path $KsIsoPath)) {
            throw "No se puede acceder a la ISO Kickstart: $KsIsoPath"
          }

          # 5. Crear VHDX en CSV
          if (-not (Test-Path $vhdPath)) {
            New-VHD -Path $vhdPath -SizeBytes $DiskBytes -Dynamic | Out-Null
            Write-Host "✓ VHD creado: $vhdPath"
          } else {
            Write-Host "VHD ya existía: $vhdPath"
          }

          # 6. Crear VM (primero local, luego se hace HA)
          $vm = Get-VM -Name $VmName -ErrorAction SilentlyContinue
          if (-not $vm) {
            New-VM -Name $VmName `
                   -MemoryStartupBytes $MemoryBytes `
                   -Generation 2 `
                   -SwitchName $SwitchName `
                   -Path $vmRoot `
                   -NoVHD | Out-Null
            $vm = Get-VM -Name $VmName
            Write-Host "✓ VM creada: $VmName"
          } else {
            Write-Host "VM ya existía: $VmName"
          }

          # 7. Configurar VLAN si es necesario
          if ($VlanId -gt 0) {
            Write-Host "Configurando VLAN $VlanId..."
            $nic = $null
            for ($i = 1; $i -le 10; $i++) {
              $nic = Get-VMNetworkAdapter -VMName $VmName -ErrorAction SilentlyContinue
              if ($nic) { break }
              Start-Sleep -Seconds 1
            }
            if ($nic) {
              Set-VMNetworkAdapterVlan -VMName $VmName `
                                       -VMNetworkAdapterName $nic.Name `
                                       -Access `
                                       -VlanId $VlanId
              Write-Host "✓ VLAN $VlanId configurada"
            }
          } else {
            Set-VMNetworkAdapterVlan -VMName $VmName -Untagged -ErrorAction SilentlyContinue
          }

          # 8. Agregar disco duro en SCSI 0:2
          Add-VMHardDiskDrive -VMName $VmName `
                               -ControllerNumber 0 `
                               -ControllerLocation 2 `
                               -Path $vhdPath

          # 9. Configurar CPU y memoria estática
          Set-VMProcessor -VMName $VmName -Count $CpuCount
          Set-VMMemory -VMName $VmName `
            -DynamicMemoryEnabled $false `
            -StartupBytes $MemoryBytes

          # 10. Asegurar VM apagada antes de configurar firmware/DVD
          $vm = Get-VM -Name $VmName
          if ($vm.State -ne 'Off') {
            Stop-VM -Name $VmName -TurnOff -Force
            Start-Sleep -Seconds 3
          }

          # 11. Quitar DVDs existentes
          Get-VMDvdDrive -VMName $VmName -ErrorAction SilentlyContinue |
            ForEach-Object {
              Remove-VMDvdDrive -VMName $VmName `
                                -ControllerNumber $_.ControllerNumber `
                                -ControllerLocation $_.ControllerLocation `
                                -Confirm:$false
            }

          # 12. Agregar DVDs: Rocky en SCSI 0:0, Kickstart en 0:1
          Add-VMDvdDrive -VMName $VmName `
                         -ControllerNumber 0 `
                         -ControllerLocation 0 `
                         -Path $IsoPath | Out-Null

          Add-VMDvdDrive -VMName $VmName `
                         -ControllerNumber 0 `
                         -ControllerLocation 1 `
                         -Path $KsIsoPath | Out-Null

          # 13. Configurar firmware UEFI
          $dvd = Get-VMDvdDrive -VMName $VmName | Where-Object { $_.Path -eq $IsoPath }
          Set-VMFirmware -VMName $VmName `
            -EnableSecureBoot Off `
            -FirstBootDevice $dvd
          Write-Host "✓ Firmware UEFI configurado (SecureBoot OFF)"

          # ----------------------------------------------------------------
          # 14. Registrar VM en el Failover Cluster como Highly Available
          # ----------------------------------------------------------------
          Write-Host "`nRegistrando VM en el Failover Cluster..."

          $clusterGroup = Get-ClusterGroup -Name $VmName -ErrorAction SilentlyContinue

          if (-not $clusterGroup) {
            try {
              Add-ClusterVirtualMachineRole -VMName $VmName -ErrorAction Stop | Out-Null
              Write-Host "✓ VM registrada como recurso HA en el cluster"
            } catch {
              throw "Error al registrar VM en cluster: $($_.Exception.Message)"
            }
          } else {
            Write-Host "La VM ya estaba registrada en el cluster"
          }

          # Esperar a que el ClusterGroup esté disponible (máx 30 seg)
          $clusterGroup = $null
          for ($i = 1; $i -le 15; $i++) {
            $clusterGroup = Get-ClusterGroup -Name $VmName -ErrorAction SilentlyContinue
            if ($clusterGroup) { break }
            Write-Host "  Esperando ClusterGroup... intento $i/15"
            Start-Sleep -Seconds 2
          }

          if (-not $clusterGroup) {
            throw "El ClusterGroup '$VmName' no apareció tras registrar la VM en el cluster."
          }

          Write-Host "✓ ClusterGroup detectado: Estado=$($clusterGroup.State), Nodo=$($clusterGroup.OwnerNode)"

          # ----------------------------------------------------------------
          # 15. Iniciar VM SIEMPRE a través del Failover Cluster
          # ----------------------------------------------------------------
          Write-Host "`nIniciando VM a través del Failover Cluster..."

          if ($clusterGroup.State -ne 'Online') {
            try {
              Start-ClusterGroup -Name $VmName -ErrorAction Stop | Out-Null

              # Esperar hasta que quede Online (máx 60 seg)
              $timeout  = 30
              $elapsed  = 0
              $interval = 2
              do {
                Start-Sleep -Seconds $interval
                $elapsed     += $interval
                $clusterGroup = Get-ClusterGroup -Name $VmName -ErrorAction SilentlyContinue
                Write-Host "  Estado cluster: $($clusterGroup.State) ($elapsed s)"
              } while ($clusterGroup.State -notin @('Online','Failed') -and $elapsed -lt $timeout)

              if ($clusterGroup.State -eq 'Online') {
                Write-Host "✓ VM iniciada correctamente a través del cluster"
              } elseif ($clusterGroup.State -eq 'Failed') {
                throw "El ClusterGroup entró en estado 'Failed'. Revisa el Event Viewer del nodo $($clusterGroup.OwnerNode)."
              } else {
                Write-Host "⚠ La VM no alcanzó estado Online en $timeout segundos (estado: $($clusterGroup.State))"
              }
            } catch {
              throw "Error al iniciar VM en cluster: $($_.Exception.Message)"
            }
          } else {
            Write-Host "La VM ya estaba en estado Online en el cluster"
          }

          Write-Host "`n=========================================="
          Write-Host "✓ VM creada y registrada en Failover Cluster"
          Write-Host "=========================================="
          Write-Host "VM:           $VmName"
          Write-Host "CSV:          $selectedCsv"
          Write-Host "VHD:          $vhdPath"
          Write-Host "Cluster:      $($cluster.Name)"
          Write-Host "Nodo actual:  $($clusterGroup.OwnerNode)"
          Write-Host "Estado:       $($clusterGroup.State)"
          Write-Host "=========================================="

        parameters:
          VmName: "{{ vm_name }}"
          MemoryBytes: "{{ memory_bytes }}"
          DiskBytes: "{{ disk_bytes }}"
          CpuCount: "{{ cpu_count }}"
          SwitchName: "{{ v_switch_eff }}"
          IsoPath: "{{ iso_path_eff }}"
          KsIsoPath: "{{ ks_iso_path }}"
          CsvVolumes: "{{ csv_volumes }}"
          VlanId: "{{ vm_vlan | default('0') | int }}"

    # -------------------------------------------------------------------
    # 5) Mensaje final
    # -------------------------------------------------------------------
    - name: Resumen de la creación
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "VM CLUSTER creada exitosamente: {{ vm_name }}"
          - "Host ejecutor: {{ inventory_hostname }}"
          - "Cluster: Hyper-V Failover Cluster"
          - "Alta disponibilidad: SÍ"
          - "Almacenamiento: CSV (Cluster Shared Volume)"
          - "============================================"
          - "Configuración:"
          - "  Memoria: {{ memory_gb }} GB (estática)"
          - "  CPU: {{ cpu_count }} cores"
          - "  Disco: {{ disk_gb }} GB"
          - "  IP: {{ vm_ip }}/{{ vm_mask }}"
          - "  Gateway: {{ vm_gateway }}"
          - "  DNS: {{ vm_dns1 }}, {{ vm_dns2_eff }}"
          - "  vSwitch: {{ v_switch_eff }}"
          - "============================================"
          - "La VM está arrancando con instalación automática"
          - "Puede migrar entre nodos SMXHYPVA y SMXHYPVB"
          - "============================================"