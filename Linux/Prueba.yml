---
- name: Prueba de ping con Ansible
  hosts: all
  gather_facts: false
  tasks:
    - name: Detectar Python disponible
      raw: >
        python3.9 --version 2>/dev/null && echo "/usr/bin/python3.9" ||
        python3.8 --version 2>/dev/null && echo "/usr/bin/python3.8" ||
        python3 --version 2>/dev/null && echo "/usr/bin/python3" ||
        echo "/usr/bin/python"
      register: python_path
      changed_when: false

    - name: Establecer interprete Python
      set_fact:
        ansible_python_interpreter: "{{ python_path.stdout_lines | select('match', '/usr/bin/python') | first }}"

    - name: Hacer ping a los hosts
      ansible.builtin.ping: